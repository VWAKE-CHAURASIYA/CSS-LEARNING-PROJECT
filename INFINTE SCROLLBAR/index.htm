<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Scrolling Carasual Effect</title>
     <link rel="stylesheet" href="./style.css">
</head>
<body>
    <h1 style="text-align: center; color: blue;">INFINITE SCROLL CARASUAL EFFECT FEATURE</h1>

    <!-- SCROLLING TOWARDS LEFT:  -->
    <div class="carasual-container">
        <div class="carasual-scroll-1">
            <div class="item">Item 1</div>
            <div class="item">Item 2</div>
            <div class="item">Item 3</div>
            <div class="item">Item 4</div>
            <div class="item">Item 5</div>
            <!-- repeating the items:  -->
            <div class="item">Item 1</div>
            <div class="item">Item 2</div>
            <div class="item">Item 3</div>
            <div class="item">Item 4</div>
            <div class="item">Item 5</div>
        </div>
    </div>

    <!-- SCROLLING TOWARDS RIGHT:  -->
     <div class="carasual-container">
        <div class="carasual-scroll-2">
            <div class="item">Item 1</div>
            <div class="item">Item 2</div>
            <div class="item">Item 3</div>
            <div class="item">Item 4</div>
            <div class="item">Item 5</div>
            <!-- repeating the items:  -->
            <div class="item">Item 1</div>
            <div class="item">Item 2</div>
            <div class="item">Item 3</div>
            <div class="item">Item 4</div>
            <div class="item">Item 5</div>
        </div>
    </div>
</body>
</html>
